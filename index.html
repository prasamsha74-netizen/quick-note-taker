<!DOCTYPE html>
<html>
<head>
    <title>Quick Note Taker - New file</title>
    <style>
    :root {
        --bg-color: #cfc7c7;
        --panel-color: #79b9bb;
        --text-color: #0c0a0a;
        --accent-color: #bfdbee;
        --button-hover: #e9a7b6;
       
    }

    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-color:#89c2f7;
        color: var(--text-color);
        margin: 0;
        display: flex;
        flex-direction: column;
        height: 100vh;
        overflow: hidden;    
    }
    h1{
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        font-size:20px;
        text-align: left;
        color: black;
        margin-top : 9px;
    }

     .controls {
        background-color: var(--panel-color);
        padding: 10px;
        display: flex;
        gap: 8px;
        border-bottom: 8px solid #7e802c;
    }

    button {
        background-color: #7f9b75;
        color: rgb(59, 2, 2);
        border: none;
        padding: 6px 12px;
        border-radius: 9px;
        cursor: pointer;
        transition: background 0.2s;
        font-size: 13px;
    }

    button:hover {
        background-color: var(--accent-color);
    }

    #editor {
        flex-grow: 1;
        background-color: var(--bg-color);
        color: #130000;
        border: 9px solid #a4b68d;
        padding: 20px;
        font-family: 'Consolas', 'Courier New', monospace;
        font-size: 16px;
        resize: none;
        outline: navajowhite;
        line-height: 1.5;
    }

    #status {
        background-color: var(--accent-color);
        color: rgb(108, 107, 179);
        font-size: 12px;
        padding: 2px 10px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }
</style>
</head>
<body>
    <h1>📝Quick Note Taker</h1>
    <div class="controls">
        <button id="new-note"> 📝 New Note</button>
        <button id="open-file">📂 Open File</button>
        <button id="save">💾 Save</button>
        <button id="save-as">💾 Save As</button>
    </div>
    <textarea id="editor"></textarea>
    <div id="status">Ready</div>
    <script src="renderer.js"></script>
</body>
</html>
